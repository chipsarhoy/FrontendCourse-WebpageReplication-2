<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | The Flying Cowboys</title>
    <link rel="stylesheet" href="./styles/main.css" type="text/css" />
  </head>
  <body>
    <header>
      <img src="./assets/flying-cowboys.png" />
    </header>
    <main>
      <section class="hero-container">
        <video autoplay loop>
          <source src="./assets/planes.mp4" />
        </video>
        <img src="./assets/flying-cowboys.png" alt="Flying Cowboys logo" />
      </section>

      <section class="mission-wrapper">
        <!-- <img src="./assets/mission.png" alt="Flying Cowboys grouped together" /> -->
        <h1>Our mission</h1>
        <img src="./assets/mission-emblem.png" />
        <p>
          The Flying Cowboys are a gorup of back country aviation enthusiasts
          striving to increase their skills while promoting general aviation
          through continual training and sharing of their lessons learned
          through social media.
        </p>
      </section>

      <section class="planes-wrapper">
        <img
          src="./assets/background.png"
          alt="Two small planes resting on a hill"
        />
      </section>
    </main>
  </body>
</html>
